<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>购买额度 | 寰星云科 API 使用文档</title>
    <meta name="description" content="登录寰星云科控制台后，从「钱包管理」完成额度购买。" />
    <link rel="icon" href="/docs/logo.png" />
    <link rel="stylesheet" href="/docs/styles.css" />
  </head>
  <body>
    <div data-mount="topbar"></div>
    <div class="shell">
      <aside class="sidebar" data-mount="sidebar"></aside>
      <main class="content">
        <nav class="breadcrumb" data-mount="breadcrumb"></nav>
        <article class="page">
          <header class="page-heading">
            <p class="eyebrow">快速开始 · 第 1 步</p>
            <h1>购买额度</h1>
          </header>

          <p>登录控制台后，进入左侧「钱包管理」页面购买额度。</p>

          <figure>
            <img src="/docs/assets/img/register-3-packages.png" alt="钱包管理 · 充值页面" data-slot="register-3-packages" />
            <figcaption>占位图：钱包管理 · 充值页面</figcaption>
          </figure>

          <h2>充值步骤</h2>
          <ol class="ordered">
            <li>在「选择充值额度」中选择固定额度，或在「自定义额度」中输入要充值的金额。</li>
            <li>确认页面下方的「实付金额」。</li>
            <li>点击「立即支付」。</li>
          </ol>

          <h2>支付说明</h2>
          <p>目前充值比例为 <strong>1:1</strong>，即 1 元人民币等同于 1 美元额度。</p>

          <div class="warning">
            <p>如果使用支付宝或微信支付时没有弹出支付页面，请先关闭代理后重试。</p>
          </div>

          <h2>下一步</h2>
          <p>余额到位后，前往 <a href="/docs/register/4-token.html">创建 API 令牌</a>，把额度划分给具体的客户端。</p>
        </article>
        <nav class="page-nav" data-mount="prevnext"></nav>
      </main>
    </div>
    <div data-mount="footer"></div>
    <script src="/docs/app.js"></script>
  </body>
</html>
