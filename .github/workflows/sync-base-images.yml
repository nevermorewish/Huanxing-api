name: Sync base images to ACR

on:
  workflow_dispatch:

jobs:
  sync:
    name: Sync Docker Hub base images
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      ACR_REGISTRY: crpi-dzjyl2rfnlfugj1m.cn-shanghai.personal.cr.aliyuncs.com
      ACR_NAMESPACE: frogclaw
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}

    steps:
      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Log in to Docker Hub
        run: |
          echo "${DOCKERHUB_TOKEN}" | skopeo login docker.io \
            --username "${DOCKERHUB_USERNAME}" \
            --password-stdin

      - name: Log in to Aliyun ACR
        run: |
          echo "${ACR_PASSWORD}" | skopeo login "${ACR_REGISTRY}" \
            --username "${ACR_USERNAME}" \
            --password-stdin

      - name: Sync oven/bun
        run: |
          skopeo copy --all \
            docker://docker.io/oven/bun:1 \
            docker://${ACR_REGISTRY}/${ACR_NAMESPACE}/base-bun:1

      - name: Sync golang
        run: |
          skopeo copy --all \
            docker://docker.io/library/golang:1.26.1-alpine \
            docker://${ACR_REGISTRY}/${ACR_NAMESPACE}/base-golang:1.26.1-alpine

      - name: Sync golang 1.26.3
        run: |
          skopeo copy --all \
            docker://docker.io/library/golang:1.26.3-alpine \
            docker://${ACR_REGISTRY}/${ACR_NAMESPACE}/base-golang:1.26.3-alpine

      - name: Sync node
        run: |
          skopeo copy --all \
            docker://docker.io/library/node:24-alpine \
            docker://${ACR_REGISTRY}/${ACR_NAMESPACE}/base-node:24-alpine

      - name: Sync node 22
        run: |
          skopeo copy --all \
            docker://docker.io/library/node:22-alpine \
            docker://${ACR_REGISTRY}/${ACR_NAMESPACE}/base-node:22-alpine

      - name: Sync alpine 3.20
        run: |
          skopeo copy --all \
            docker://docker.io/library/alpine:3.20 \
            docker://${ACR_REGISTRY}/${ACR_NAMESPACE}/base-alpine:3.20

      - name: Sync alpine 3.21
        run: |
          skopeo copy --all \
            docker://docker.io/library/alpine:3.21 \
            docker://${ACR_REGISTRY}/${ACR_NAMESPACE}/base-alpine:3.21

      - name: Sync postgres 18
        run: |
          skopeo copy --all \
            docker://docker.io/library/postgres:18-alpine \
            docker://${ACR_REGISTRY}/${ACR_NAMESPACE}/base-postgres:18-alpine

      - name: Sync python 3.13 slim
        run: |
          skopeo copy --all \
            docker://docker.io/library/python:3.13-slim \
            docker://${ACR_REGISTRY}/${ACR_NAMESPACE}/base-python:3.13-slim

      - name: Sync debian
        run: |
          skopeo copy --all \
            docker://docker.io/library/debian:bookworm-slim \
            docker://${ACR_REGISTRY}/${ACR_NAMESPACE}/base-debian:bookworm-slim
